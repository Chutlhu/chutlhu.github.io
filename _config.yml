short_bio: >
  I am an Assistant/Associate Professor (*Maître de Conférences*) in the [ADASP group](https://www.telecom-paris.fr/en/research/labs/adasp) at [TelecomParis](https://www.telecom-paris.fr/), [Institute Polytechnique de Paris](https://www.ip-paris.fr/), in France.
  I am a member of the [S2A team](https://s2a.telecom-paris.fr/) team in the [IDS department](https://www.telecom-paris.fr/en/school/departments/image-data-signal).
  Here, I teach and conduct research in **signal processing** and **machine learning** for **spatial audio** and **sound scene understanding**.
  <br><br>
  I am also a visiting researcher of the [Sound Scene Understanding Team](http://www.riken.jp/en/research/labs/aip/goalorient_tech/sound_scene_understand/), [Center for Advanced Intelligence Project (AIP)](https://www.riken.jp/en/research/labs/aip/index.html), [RIKEN](http://www.riken.jp/en/) in Kyoto, Japan.


short_bio2: >
  I am a **postodoctoral researcher** at in the [Sound Scene Understanding Team](http://www.riken.jp/en/research/labs/aip/goalorient_tech/sound_scene_understand/),
  [Center for Advanced Intelligence Project (AIP)](https://www.riken.jp/en/research/labs/aip/index.html), [RIKEN](http://www.riken.jp/en/) and
  a visiting researcher in the [Speech and Audio Processing Group](http://sap.ist.i.kyoto-u.ac.jp/EN/), [Kyoto University](https://www.kyoto-u.ac.jp/en/).

