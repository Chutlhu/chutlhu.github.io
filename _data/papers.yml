  - title: "SIRUP: A diffusion-based virtual upmixer of steering vectors for highly-directive spatialization with first-order ambisonics"
    id: sirup
    author: 'Emilio Picard, Diego Di Carlo, Aditya Arie Nugraha, Mathieu Fontaine, Kazuyoshi Yoshii'
    booktitle: IEEE International Conference on Acoustics, Speech and Signal Processing (ICASSP)
    keywords: Steering vectors, virtual upmixing, latent diffusion model, sound source localization, beamforming.
    year: 2026
    resources_link:
      - name: Github
        icon: fa fa-github
        link: https://github.com/emilio-pcrd/sirup
      - name: Arxiv
        icon: ai ai-arxiv
        link: https://arxiv.org/pdf/2602.17732
      - name: HAL
